<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitation 🎉</title>

<style>
body {
  margin: 0;
  background: black;
  color: #ff69b4;
  font-family: 'Arial', sans-serif;
  text-align: center;
  overflow: hidden;
}

/* écran */
.screen {
  position: absolute;
  width: 100%;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  transition: opacity 1s;
}

/* caché */
.hidden {
  opacity: 0;
  pointer-events: none;
}

/* enveloppe */
#enveloppe {
  font-size: 90px;
  cursor: pointer;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0% {transform: scale(1);}
  50% {transform: scale(1.2);}
  100% {transform: scale(1);}
}

/* texte néon */
.neon {
  color: #ff69b4;
  text-shadow:
    0 0 5px #ff69b4,
    0 0 10px #ff69b4,
    0 0 20px #ff1493;
}

/* bouton */
button {
  margin-top: 20px;
  padding: 15px 25px;
  border: none;
  border-radius: 30px;
  background: #ff69b4;
  color: white;
  font-size: 18px;
  cursor: pointer;
  box-shadow: 0 0 10px #ff69b4;
}

button:hover {
  transform: scale(1.1);
}

/* confettis */
.confetti {
  position: absolute;
  width: 10px;
  height: 10px;
  background: pink;
  top: -10px;
  animation: fall linear infinite;
}

@keyframes fall {
  to {
    transform: translateY(100vh) rotate(360deg);
  }
}
</style>
</head>

<body>

<!-- écran 1 -->
<div id="screen1" class="screen">
  <div id="enveloppe">✉️</div>
  <p class="neon">Clique pour ouvrir 👀</p>
</div>

<!-- écran 2 -->
<div id="screen2" class="screen hidden">
  <h1 class="neon">C’est mon anniversaire 🎂</h1>
  <p>Et tu es invité(e) 💖</p>
</div>

<!-- écran 3 -->
<div id="screen3" class="screen hidden">
  <h2 class="neon">📅 15 juin</h2>
  <h2>🕒 19h</h2>
  <h2>📍 Chez moi</h2>
</div>

<!-- écran 4 -->
<div id="screen4" class="screen hidden">
  <h1 class="neon">Tu viens ? 😏</h1>
  <button onclick="reponse()">OUI 😍</button>
</div>

<script>
const s1 = document.getElementById("screen1");
const s2 = document.getElementById("screen2");
const s3 = document.getElementById("screen3");
const s4 = document.getElementById("screen4");

document.getElementById("enveloppe").onclick = () => {
  s1.classList.add("hidden");

  setTimeout(() => {
    s2.classList.remove("hidden");
  }, 800);

  setTimeout(() => {
    s2.classList.add("hidden");
    s3.classList.remove("hidden");
  }, 3000);

  setTimeout(() => {
    s3.classList.add("hidden");
    s4.classList.remove("hidden");
    lancerConfettis();
  }, 6000);
};

function reponse() {
  alert("Trop bien 😍 Hâte de te voir !");
}

/* confettis */
function lancerConfettis() {
  for (let i = 0; i < 50; i++) {
    let confetti = document.createElement("div");
    confetti.classList.add("confetti");
    confetti.style.left = Math.random() * 100 + "vw";
    confetti.style.animationDuration = (Math.random() * 3 + 2) + "s";
    document.body.appendChild(confetti);
  }
}
</script>

</body>
</html>
