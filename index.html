<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GALA 20 ANS | CHAPITRE VIOLET</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --v-dark: #1a0033; 
            --v-bright: #9d50bb; 
            --pink: #ff00cc; 
            --silver: #e0e0e0;
            --bg: #0a0015; 
            --glass: rgba(20, 0, 40, 0.95); 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: white; height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        canvas { position: fixed; inset: 0; z-index: -1; }

        .card-container { 
            position: relative; 
            width: min(92%, 400px); 
            padding: 2px; 
            border-radius: 30px; 
            background: linear-gradient(135deg, var(--v-bright), var(--pink)); 
            box-shadow: 0 0 30px rgba(157, 80, 187, 0.4);
        }

        .card { 
            background: var(--glass); 
            border-radius: 28px; 
            padding: 25px; 
            text-align: center; 
            height: 570px; 
  display: flex;
            flex-direction: column; 
            align-items: center; 
  justify-content: center;
            backdrop-filter: blur(10px);
        }

        h1 { font-family: 'Playfair Display', serif; font-size: 1.7rem; margin-bottom: 8px; width: 100%; letter-spacing: 1px; color: var(--silver); }
        .tag { color: var(--pink); font-size: 0.65rem; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 10px; }
        p { font-size: 0.85rem; opacity: 0.85; margin-bottom: 15px; line-height: 1.5; color: #d1d1d1; }

        .btn { 
            background: linear-gradient(to right, #fff, var(--silver)); 
            color: #1a0033; border: none; padding: 15px; border-radius: 15px; 
            font-weight: 900; text-transform: uppercase; width: 100%; cursor: pointer; 
            font-size: 0.8rem; margin-top: 10px; box-shadow: 0 4px 15px rgba(255,0,204,0.3); 
            transition: 0.3s;
}

        .btn-opt { background: rgba(157, 80, 187, 0.1); color: white; border: 1px solid rgba(157, 80, 187, 0.3); margin-bottom: 8px; padding: 12px; transition: 0.3s; width: 100%; border-radius: 12px; }

        input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--v-bright); background: rgba(0,0,0,0.5); color: white; text-align: center; margin-bottom: 10px; outline: none; }

        .slot-box { display: flex; justify-content: center; gap: 8px; margin: 15px 0; }
        .slot { width: 65px; height: 85px; background: #000; border: 2px solid var(--v-bright); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; box-shadow: inset 0 0 15px var(--v-dark); }
        
        #zone { height: 180px; width: 100%; position: relative; background: rgba(20, 0, 40, 0.6); border-radius: 20px; border: 1px solid rgba(157, 80, 187, 0.2); margin: 5px 0; overflow: hidden; }
        .tgt { position: absolute; font-size: 32px; cursor: pointer; padding: 15px; transform: translate(-50%, -50%); z-index: 100; filter: drop-shadow(0 0 10px var(--pink)); }

        .simon { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 150px; margin: 5px auto; }
        .s-btn { height: 70px; border-radius: 12px; opacity: 0.2; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }
        .s-btn.active { opacity: 1; box-shadow: 0 0 20px var(--pink); border-color: white; }

        #wheel { width: 150px; height: 150px; border-radius: 50%; border: 4px solid var(--silver); background: conic-gradient(var(--v-dark) 0 25%, var(--v-bright) 25% 50%, var(--pink) 50% 75%, #4b0082 75% 100%); transition: transform 0.2s linear; }

        @media print {
            body { background: white !important; }
            .card-container, canvas { display: none !important; }
            .print-pass { display: block !important; border: 8px double #4b0082; padding: 50px; text-align: center; color: black !important; background: white !important; width: 100%; max-width: 600px; margin: 20px auto; }
            .print-pass h1 { font-size: 30pt; color: #4b0082 !important; }
        }
        .print-pass { display: none; }
</style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="card-container">
    <div id="app" class="card"></div>
</div>

<div id="pZone" class="print-pass"></div>

<script>
    let st = { s: 0, n: "", v: "", h: 0, q: 0, u: [], g: "", a: 0, sp: false };
    
    const rl = [
        {e:'💎', l:'MEMBRE DIAMANT (VIP)'}, 
        {e:'🔥', l:'LÉGENDE DE LA NUIT'}, 
        {e:'👑', l:'SOUVERAIN DU GALA'}, 
        {e:'🥂', l:'AMBASSADEUR PRIVILÈGE'},
        {e:'✨', l:'ÉTOILE MONTANTE'},
        {e:'🌪️', l:'TOURBILLON DE LA FÊTE'},
        {e:'🦄', l:'INVITÉ MYTHIQUE'},
        {e:'🕶️', l:'AGENT SECRET DU GALA'}
    ];

    const qz = [
        {q:"Quelle est ma date d'anniversaire ?", a:["26 avril","24 avril","28 avril"], g:1},
        {q:"Quelle est ma boisson préférée ?", a:["Coca","Fanta","Ice Tea"], g:2},
        {q:"Mon souhait le plus fou ?", a:["Villa Privée","Voyage Infini","Bolide Italien"], g:1},
        {q:"Ce qui me fait le plus peur ?", a:["Araignées","Le Vide","Les Hommes"], g:2},
        {q:"Quel est mon chanteur préféré ?", a:["Dadju","Tayc","Matt Pokora"], g:0}
    ];

    // MESSAGES DRÔLES POUR LES ERREURS
    const fails = [
        "Aïe... On est amis ou on se connaît juste de vue ? 😂",
        "Même mon chat connaît la réponse. Concentre-toi ! 🐱",
        "Ouh là, la soirée n'a pas commencé que tu es déjà perdu ?",
        "Faux ! Je vais finir par croire que tu t'es trompé de fête. 🙄",
        "Grosse erreur. Heureusement que le ridicule ne tue pas !"
    ];

    function getFail() { return fails[Math.floor(Math.random() * fails.length)]; }

    function draw() {
        const app = document.getElementById('app');
        let h = `<div class="tag">Protocole ${st.s}/8</div>`;

        if(st.s===0) {
            h += `<h1>CHAPITRE 20</h1><p>Préparez-vous à l'événement de l'année. Votre accès doit être mérité.</p><button class="btn" onclick="go()">Lancer l'expérience</button>`;
        } else if(st.s===1) {
            h += `<h1>VOTRE NOM</h1><p>Sous quel nom souhaitez-vous marquer cette nuit ?</p><input type="text" id="ni" placeholder="Votre nom..."><button class="btn" onclick="save()">Continuer</button>`;
        } else if(st.s===2) {
            h += `<h1>LE TEST</h1><p>Seuls les proches connaissent la vérité.</p><b>${qz[st.q].q}</b><div style="margin-top:10px">` + qz[st.q].a.map((o,i)=>`<button class="btn btn-opt" onclick="cq(${i})">${o}</button>`).join('') + `</div>`;
        } else if(st.s===3) {
            h += `<h1>DESTINÉE</h1><p>Déterminez votre statut exclusif.</p><div class="slot-box"><div class="slot" id="s1">?</div><div class="slot" id="s2">?</div><div class="slot" id="s3">?</div></div><h3 id="rlTxt" style="color:var(--pink); min-height:25px; margin-top:5px; font-weight:900;"></h3><button class="btn" id="sb" onclick="spin()">Tirer le levier</button>`;
        } else if(st.s===4) {
            h += `<h1>AGILITÉ</h1><p id="sc" style="color:var(--pink); font-weight:900">SCORE : ${st.h}/5</p><div id="zone"></div>`;
            setTimeout(spawn, 50);
        } else if(st.s===5) {
            h += `<h1>SÉQUENCE</h1><p>Mémorisez le code d'accès.</p><div class="simon">
                <div class="s-btn" id="b1" style="background:var(--v-bright)" onclick="hs(1)"></div>
                <div class="s-btn" id="b2" style="background:var(--pink)" onclick="hs(2)"></div>
                <div class="s-btn" id="b3" style="background:#4b0082" onclick="hs(3)"></div>
                <div class="s-btn" id="b4" style="background:var(--silver)" onclick="hs(4)"></div>
            </div><button class="btn" id="ss" onclick="ps()">Voir la séquence</button>`;
        } else if(st.s===6) {
            h += `<h1>LE GAGE</h1><p>Tournez la roue pour valider votre venue.</p><div id="wheel"></div><p id="wg" style="color:var(--pink); font-weight:bold; height:20px; margin:5px 0;"></p><button class="btn" id="wb" onclick="tw()">Lancer la roue</button>`;
        } else if(st.s===7) {
            h += `<h1>FINALISATION</h1><p>Dresscode <b>Violet & Argent</b> obligatoire. Prêt à rejoindre l'élite ?</p><button class="btn" onclick="go()">J'ACCEPTE</button>`;
        } else if(st.s===8) {
            h += `<h1>VOTRE PASS ACCORDÉ</h1><div style="background:rgba(157, 80, 187, 0.1); padding:20px; border-radius:20px; width:100%; border: 1px solid var(--pink);">
            <h2 style="margin-bottom:5px; font-family:'Playfair Display'; color:var(--silver);">${st.n}</h2><p style="color:var(--pink); font-weight:900;">${st.v}</p>
            <p style="border-top:1px solid rgba(255,255,255,0.1); padding-top:10px; margin-top:10px; font-size:0.8rem; color:#eee"><b>VOTRE GAGE :</b> ${st.g}</p></div><button class="btn" onclick="prnt()">Imprimer mon invitation</button>`;
        }
        app.innerHTML = h;
    }

    function go() { st.s++; draw(); }
    function save() { st.n = document.getElementById('ni').value || "Invité d'Honneur"; go(); }
    function cq(i) { if(i===qz[st.q].g){ st.q++; if(st.q>=5) go(); else draw(); } else alert(getFail()); }

    function spin() {
        const b = document.getElementById('sb'); b.style.display='none';
        const target = rl[Math.floor(Math.random()*rl.length)];
        let count = 0;
        const itv = setInterval(() => {
            const emojisRoll = ['💎','✨','💜','🥂','🔥','🌪️','🕶️','🦄'];
            document.getElementById('s1').innerText = emojisRoll[Math.floor(Math.random()*emojisRoll.length)];
            document.getElementById('s2').innerText = emojisRoll[Math.floor(Math.random()*emojisRoll.length)];
            document.getElementById('s3').innerText = emojisRoll[Math.floor(Math.random()*emojisRoll.length)];
            if(count++ > 18) {
                clearInterval(itv);
                document.getElementById('s1').innerText = target.e;
                document.getElementById('s2').innerText = target.e;
                document.getElementById('s3').innerText = target.e;
                document.getElementById('rlTxt').innerText = target.l;
                st.v = target.l;
                setTimeout(go, 2000);
            }
        }, 70);
    }

    function spawn() {
        const z = document.getElementById('zone'); if(!z) return;
        z.innerHTML = '';
        const t = document.createElement('div');
        t.className = 'tgt'; t.innerText = '💎';
        t.style.left = (Math.random()*70+15)+'%'; t.style.top = (Math.random()*70+15)+'%';
        t.onclick = (e) => {
            e.stopPropagation(); st.h++;
            document.getElementById('sc').innerText = `SCORE : ${st.h}/5`;
            if(st.h>=5) go(); else spawn();
        };
        z.appendChild(t);
    }

    function ps() {
        const s = [1, 3, 2, 4]; document.getElementById('ss').style.visibility='hidden';
        s.forEach((v, i) => {
  setTimeout(() => {
                const b = document.getElementById('b'+v);
                if(b) { b.classList.add('active'); setTimeout(()=>b.classList.remove('active'), 400); }
            }, i*700);
        });
    }

    function hs(id) {
        st.u.push(id);
        const b = document.getElementById('b'+id);
        b.classList.add('active'); setTimeout(()=>b.classList.remove('active'), 200);
        if(st.u.length === 4) {
            if(st.u.join('')==="1324") go();
            else { alert("Ouh là, Alzheimer précoce ? Retiens bien l'ordre ! 🧠"); st.u=[]; document.getElementById('ss').style.visibility='visible'; }
        }
    }

    let wi;
    function tw() {
        const b = document.getElementById('wb');
        if(!st.sp) {
            st.sp = true; b.innerText = "ARRÊTER";
            wi = setInterval(() => { st.a += 25; document.getElementById('wheel').style.transform = `rotate(${st.a}deg)`; }, 20);
        } else {
            clearInterval(wi); st.sp = false;
            const gages = ["Me faire un gros câlin", "Lancer le Karaoké", "Ouvrir la piste de danse", "Faire un discours de 20s","Me faire une déclaration","Faire une photo drôle avec tout le monde","Raconter ton pire dossier","Juger le meilleur danseur de la soirée",];
            st.g = gages[Math.floor(Math.random()*gages.length)];
            document.getElementById('wg').innerText = "GAGE : " + st.g;
            b.innerText = "CONTINUER";
            b.onclick = go;
        }
    }

    function prnt() {
        document.getElementById('pZone').innerHTML = `
            <p style="letter-spacing:10px; color:#4b0082">OFFICIEL</p>
            <h1>GALA DES 20 ANS</h1>
            <p>20 JUIN • 21H00 • VILLA SECRET</p>
            <h2 style="text-transform:uppercase">${st.n}</h2>
            <p style="font-size:22pt; font-weight:bold; color:#9d50bb">${st.v}</p>
            <div style="border:4px double #4b0082; padding:25px; margin:30px 0;">
                <b>VOTRE MISSION :</b><br>
                <span style="font-size:18pt">${st.g}</span>
            </div>
            <p>TENUE : VIOLET & ARGENT</p>`;
        window.print();
    }

    const cv = document.getElementById('stars'), cx = cv.getContext('2d');
    function rs() { cv.width = window.innerWidth; cv.height = window.innerHeight; }
    window.onresize = rs; rs();
    const dots = Array.from({length:80},()=>({x:Math.random()*innerWidth, y:Math.random()*innerHeight, o:Math.random()}));
    function anim() {
        cx.clearRect(0,0,cv.width,cv.height);
        dots.forEach(p => { cx.globalAlpha = Math.abs(Math.sin(p.o+=0.01)); cx.beginPath(); cx.arc(p.x,p.y,1.5,0,Math.PI*2); cx.fillStyle="white"; cx.fill(); });
        requestAnimationFrame(anim);
  }
}
</script>
</body>
</html>
